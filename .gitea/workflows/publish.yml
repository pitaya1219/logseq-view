name: Publish to crates.io

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.2.0, without v prefix)'
        required: true
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # UI path: triggered via Actions → Run workflow
  # Bumps version, generates CHANGELOG, commits, creates tag → triggers publish job
  bump-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        env:
          GITEA_TOKEN: ${{ secrets.WORKFLOW_BOT_TOKEN }}
        run: |
          SERVER=$(echo "${GITHUB_SERVER_URL}" | sed 's|^https\?://||')
          git config user.name "workflow-bot"
          git config user.email "workflow-bot@localhost"
          ORIGIN=$(echo "${GITHUB_SERVER_URL}" | sed "s|://|://workflow-bot:${GITEA_TOKEN}@|")
          git remote set-url origin "${ORIGIN}/${GITHUB_REPOSITORY}.git"

      - name: Bump version in Cargo.toml and Cargo.lock
        run: |
          VERSION="${{ github.event.inputs.version }}"
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          awk -v v="${VERSION}" '
            /^name = "logseq-view"/ { found=1 }
            found && /^version = "/ { sub(/"[^"]*"/, "\"" v "\""); found=0 }
            { print }
          ' Cargo.lock > Cargo.lock.tmp && mv Cargo.lock.tmp Cargo.lock

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.9.1"
          TMPDIR=$(mktemp -d)
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$TMPDIR"
          sudo install -m 755 "$(find "$TMPDIR" -name 'git-cliff' -type f | head -1)" /usr/local/bin/git-cliff

      - name: Update CHANGELOG.md
        run: git cliff --tag "v${VERSION}" -o CHANGELOG.md

      - name: Commit, tag, and push
        run: |
          git add Cargo.toml Cargo.lock CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin HEAD:main "v${VERSION}"

  # CLI path: triggered by v* tag push (including the tag created by bump-and-tag above)
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "${CARGO_VERSION}" != "${VERSION}" ]; then
            echo "ERROR: Cargo.toml version (${CARGO_VERSION}) != tag version (${VERSION})"
            exit 1
          fi
          echo "Version verified: ${VERSION}"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.9.1"
          TMPDIR=$(mktemp -d)
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$TMPDIR"
          sudo install -m 755 "$(find "$TMPDIR" -name 'git-cliff' -type f | head -1)" /usr/local/bin/git-cliff

      - name: Generate release notes
        run: |
          git cliff --current --strip all > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish to crates.io
        run: |
          source $HOME/.cargo/env
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create Gitea release
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          BODY=$(cat RELEASE_NOTES.md)
          curl -sSf -X POST "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "${TAG}" \
              --arg name "${TAG}" \
              --arg body "${BODY}" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')"
