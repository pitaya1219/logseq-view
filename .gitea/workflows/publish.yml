name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Verify Cargo.toml version matches tag
        run: |
          CARGO_VERSION=$(grep -m 1 '^version' Cargo.toml | cut -d'"' -f2)
          if [ "${CARGO_VERSION}" != "${VERSION}" ]; then
            echo "ERROR: Cargo.toml version (${CARGO_VERSION}) != tag version (${VERSION})"
            exit 1
          fi
          echo "Version verified: ${VERSION}"

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.9.1"
          curl -sSL "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /tmp
          sudo mv "/tmp/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-musl/git-cliff" /usr/local/bin/git-cliff

      - name: Generate release notes
        run: |
          git cliff --current --strip all > RELEASE_NOTES.md
          cat RELEASE_NOTES.md

      - name: Publish to crates.io
        run: |
          source $HOME/.cargo/env
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Create Gitea release
        env:
          GITEA_TOKEN: ${{ gitea.token }}
        run: |
          BODY=$(cat RELEASE_NOTES.md)
          curl -sSf -X POST "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/releases" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg tag "${TAG}" \
              --arg name "${TAG}" \
              --arg body "${BODY}" \
              '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')"
